{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>GOgreen</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta content="" name="keywords">
    <meta content="" name="description">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@500;600&family=Roboto&display=swap" rel="stylesheet">
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    <link href="{% static 'css/environ.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'lib/owlcarousel/assets/owl.carousel.min.css' %}" rel="stylesheet">
    <link href="{% static 'lib/lightbox/css/lightbox.min.css' %}" rel="stylesheet">
</head>

<body>

    <!-- Spinner Start -->
    <div id="spinner"
        class="show w-100 vh-100 bg-white position-fixed translate-middle top-50 start-50  d-flex align-items-center justify-content-center">
        <div class="spinner-grow text-primary" role="status"></div>
    </div>
    <!-- Spinner End -->


    <!-- Navbar start -->
    <!-- Navbar Wrapper -->
    <div class="container-fluid fixed-top shadow-sm">

        <!-- Topbar -->
        <div class="topbar1 py-2 d-none d-md-block text-white"
            style="background: linear-gradient(90deg,#1d4712,#2e7d32); font-size:14px;">
            <div class="container d-flex justify-content-between">
                <div>
                    <span class="me-3">
                        <i class="fas fa-envelope me-1"></i> adiii@gmail.com
                    </span>
                    <span>
                        <i class="fas fa-phone-alt me-1"></i> +91 9192939495
                    </span>
                </div>

                <div>
                    <a href="#" class="text-white me-3 top-icon"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="text-white me-3 top-icon"><i class="fab fa-twitter"></i></a>
                    <a href="#" class="text-white me-3 top-icon"><i class="fab fa-instagram"></i></a>
                    <a href="#" class="text-white top-icon"><i class="fab fa-linkedin-in"></i></a>
                </div>
            </div>
        </div>

        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white py-3">
            <div class="container">

                <!-- Logo -->
                <a href="#" class="navbar-brand fw-bold fs-3 text-success">
                    🌱 GOgreen
                </a>

                <!-- Toggle -->
                <button class="navbar-toggler border-0" data-bs-toggle="collapse" data-bs-target="#navBar">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Menu -->
                <div class="collapse navbar-collapse" id="navBar">
                    <ul class="navbar-nav ms-auto align-items-lg-center">

                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{% url 'home' %}">
                                Home
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/about/' %}active{% endif %}"
                                href="{% url 'about' %}">
                                About
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/service/' %}active{% endif %}"
                                href="{% url 'service' %}">
                                Services
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/causes/' %}active{% endif %}"
                                href="{% url 'causes' %}">
                                Causes
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/events/' %}active{% endif %}"
                                href="{% url 'events' %}">Events</a>
                        </li>

                        <!-- Dropdown -->
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle 
        {% if request.resolver_match.url_name in 'blog gallery volunteer donation' %}active{% endif %}"
                                data-bs-toggle="dropdown">
                                Pages
                            </a>

                            <ul class="dropdown-menu shadow border-0">

                                <li>
                                    <a class="dropdown-item {% if request.resolver_match.url_name == 'blog' %}active{% endif %}"
                                        href="{% url 'blog' %}">
                                        Blog
                                    </a>
                                </li>

                                <li>
                                    <a class="dropdown-item {% if request.resolver_match.url_name == 'gallery' %}active{% endif %}"
                                        href="{% url 'gallery' %}">
                                        Gallery
                                    </a>
                                </li>

                                <li>
                                    <a class="dropdown-item {% if request.resolver_match.url_name == 'volunteer' %}active{% endif %}"
                                        href="{% url 'volunteer' %}">
                                        Volunteers
                                    </a>
                                </li>

                                <li>
                                    <a class="dropdown-item {% if request.resolver_match.url_name == 'donation' %}active{% endif %}"
                                        href="{% url 'donation' %}">
                                        Donation
                                    </a>
                                </li>

                            </ul>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/contact/' %}active{% endif %}"
                                href="{% url 'contact' %}">Contact</a>
                        </li>

                        <!-- Donate Button -->
                        <li class="nav-item ms-lg-4 mt-3 mt-lg-0">
                            <a href="{% url 'donation' %}" class="btn donate-btn px-4 py-2">
                                ❤️ Donate
                            </a>
                        </li>

                    </ul>
                </div>
            </div>
        </nav>
    </div>
    <!-- Navbar End -->
    <script src="{% static 'js/main.js' %}"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'lib/easing/easing.min.js' %}"></script>
    <script src="{% static 'lib/waypoints/waypoints.min.js' %}"></script>
    <script src="{% static 'lib/counterup/counterup.min.js' %}"></script>
    <script src="{% static 'lib/owlcarousel/owl.carousel.min.js' %}"></script>
    <script src="{% static 'lib/lightbox/js/lightbox.min.js' %}"></script>
</body>

{% block content %}
{% endblock %}
